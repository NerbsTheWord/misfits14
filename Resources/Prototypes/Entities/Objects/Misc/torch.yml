- type: entity
  name: torch
  parent: BaseItem
  id: Torch
  description: A torch fashioned from some wood.
  components:
    # #Misfits Change /Fix/: Make crafted torches permanent instead of burning out.
    - type: ItemToggle
      soundActivate:
        path: /Audio/Items/Flare/flare_on.ogg
      soundDeactivate:
        path: /Audio/Items/candle_blowing.ogg
    - type: Sprite
      sprite: Objects/Misc/torch.rsi
      layers:
        - map: [ enum.ExpendableLightVisualLayers.Base ]
          state: torch_unlit
        - map: [ enum.ExpendableLightVisualLayers.Glow ]
          state: lit_overlay
          color: "#FFFFFF"
          visible: false
          shader: unshaded
        - map: [ enum.ExpendableLightVisualLayers.Overlay ]
          state: torch_nocloth
    - type: Icon
      sprite: Objects/Misc/torch.rsi
      state: icon
    - type: Item
      sprite: Objects/Misc/torch.rsi
      heldPrefix: unlit
    - type: ToggleableLightVisuals
      spriteLayer: enum.ExpendableLightVisualLayers.Glow
      inhandVisuals:
        left:
        - state: lit-inhand-left
          shader: unshaded
        right:
        - state: lit-inhand-right
          shader: unshaded
    - type: Construction
      graph: LightTorch
      node: torch
    - type: Appearance
    - type: PointLight
      enabled: false
      color: "#E25822"
      radius: 5.0
      energy: 7.0
      netsync: false
    - type: IgnitionSource
      temperature: 400
      ignited: false
    - type: ItemToggleHot
    - type: ItemTogglePointLight
    - type: Tag
      tags:
      - Torch
