# Player-controlled Synthetic robots for the Misfits server.
# These inherit directly from N14BaseRobotChassis so they do NOT have the
# GhostRole component that pre-placed map robots carry.

- type: entity
  parent: N14BaseRobotChassis
  id: N14PlayerSyntheticMrHandy
  name: mr. handy
  suffix: player, synthetic
  description: A General Atomics Mr. Handy domestic servant robot, now guided by a living mind.
  components:
  - type: Sprite
    sprite: _Nuclear14/Mobs/Robots/mrhandyclaw.rsi
    layers:
    - state: icon
      map: ["movement"]
    - state: icon
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: icon
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: walking
    noMovementLayers:
      movement:
        state: icon
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  - type: Inventory
    templateId: borgShort
  - type: StepTriggerImmune
  - type: NpcFactionMember
    factions:
    - Wastelander
  - type: ContainerFill
    containers:
      borg_brain:
        - PositronicBrain
      borg_module:
        - BorgModuleDiagnosis
        - BorgModuleTreatment
        - BorgModuleSurgery
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper

