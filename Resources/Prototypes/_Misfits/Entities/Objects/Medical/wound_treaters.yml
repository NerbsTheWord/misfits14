# #Misfits Add - Wound treater items: bandages and burn wraps.
# Used interactively on entities with WoundableComponent to treat brute/burn wounds.

- type: entity
  id: MisfitsBandage
  name: bandage
  description: A roll of clean cloth bandaging. Apply to brute wounds to stop bleeding.
  parent: BaseItem
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/medical.rsi
    state: brutepack # #Misfits Fix - bandages.rsi does not exist; brutepack state in medical.rsi is visually equivalent
  - type: Item
    size: Small
  - type: WoundTreater
    wound: Brute
    treats: true
    consumable: true
    group: Brute
    scalingDoAfter: 0.3
    damage: -5
    treatBeginSound:
      path: /Audio/Items/Medical/brutepack_begin.ogg # #Misfits Fix - bandage_apply.ogg does not exist; brutepack_begin is the closest equivalent
    treatEndSound:
      path: /Audio/Items/Medical/brutepack_end.ogg # #Misfits Fix - bandage_apply.ogg does not exist; brutepack_end is the closest equivalent
    userPopup: wounds-bandage-begin-user
    targetPopup: wounds-bandage-begin-target
    othersPopup: wounds-bandage-begin-others
    userFinishPopup: wounds-bandage-finish-user
    targetFinishPopup: wounds-bandage-finish-target
    noneSelfPopup: wounds-treat-none-self
    noneOtherPopup: wounds-treat-none-other
  - type: StaticPrice
    price: 15

- type: entity
  id: MisfitsBurnWrap
  name: burn wrap
  description: Sterile gauze impregnated with cooling gel. Relieves burn wounds and stops tissue damage.
  parent: BaseItem
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/medical.rsi
    state: gauze # #Misfits Fix - bandages.rsi does not exist; gauze state exists in medical.rsi
  - type: Item
    size: Small
  - type: WoundTreater
    wound: Burn
    treats: true
    consumable: true
    group: Burn
    scalingDoAfter: 0.5
    damage: -5
    treatBeginSound:
      path: /Audio/Items/Medical/ointment_begin.ogg # #Misfits Fix - bandage_apply.ogg does not exist; ointment_begin used for burn wrap
    treatEndSound:
      path: /Audio/Items/Medical/ointment_end.ogg # #Misfits Fix - bandage_apply.ogg does not exist; ointment_end used for burn wrap
    userPopup: wounds-burnwrap-begin-user
    targetPopup: wounds-burnwrap-begin-target
    othersPopup: wounds-burnwrap-begin-others
    userFinishPopup: wounds-burnwrap-finish-user
    targetFinishPopup: wounds-burnwrap-finish-target
    noneSelfPopup: wounds-treat-none-self
    noneOtherPopup: wounds-treat-none-other
  - type: StaticPrice
    price: 25
