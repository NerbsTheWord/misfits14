# #Misfits Change - Brotherhood of Steel Washington holotag ID entity definitions.
# Consolidated here from _Nuclear14/Entities/Objects/Misc/identification.yml.
#
# The IdCardBrotherhood tag on the Initiate base enables the BOS shared faction map in the Pip-Boy.
# All other BOS Washington holotags inherit from N14IDBrotherhoodWashingtonHolotagInitiate, so they
# automatically get the tag too. The BOS MAP feed is shared across:
#   - N14BrotherhoodTacticalmap (war table, misc_machines.yml)
#   - BOS power armor helmets (powerarmorhelmet.yml in _Nuclear14 and Corvax)
#   - Pip-Boy with any BOS holotag inserted (WastelandMapCartridgeSystem.cs)
# If you add a new BOS holotag entity that does NOT inherit from N14IDBrotherhoodWashingtonHolotagInitiate,
# you must manually add the Tag component with IdCardBrotherhood.

##MARK: Brotherhood Washington
- type: entity
  parent: N14IDPassportBlank
  id: N14IDBrotherhoodWashingtonHolotagInitiate
  name: initiate's holotags
  description: An ID holotag worn by a Brotherhood initiate.
  suffix: Initiate
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Misc/identification.rsi
    state: bos_holotag
  - type: IdCard
    nameLocId: n14-id-holotag-name
    fullNameLocId: n14-id-holotag-full-name
  - type: PresetIdCard
    job: BoSWashingtonInitiate
  - type: Tag
    tags:
    - IdCardBrotherhood  # enables BOS shared map - see tags.yml comment for full faction map checklist
  - type: ClothingAddFaction
    faction: BrotherhoodOfSteel

- type: entity
  parent: N14IDBrotherhoodWashingtonHolotagInitiate
  id: N14IDBrotherhoodWashingtonHolotagScribe
  name: scribe's holotags
  description: An ID holotag worn by a Brotherhood scribe.
  suffix: Scribe
  components:
  - type: PresetIdCard
    job: BoSWashingtonScribe

- type: entity
  parent: N14IDBrotherhoodWashingtonHolotagInitiate
  id: N14IDBrotherhoodWashingtonHolotagKnight
  name: knight's holotags
  description: An ID holotag worn by a Brotherhood knight.
  suffix: Knight
  components:
  - type: PresetIdCard
    job: BoSWashingtonKnight

- type: entity
  parent: N14IDBrotherhoodWashingtonHolotagInitiate
  id: N14IDBrotherhoodWashingtonHolotagPaladin
  name: paladin's holotags
  description: An ID holotag worn by a Brotherhood paladin.
  suffix: Paladin
  components:
  - type: PresetIdCard
    job: BoSWashingtonPaladin

- type: entity
  parent: N14IDBrotherhoodWashingtonHolotagInitiate
  id: N14IDBrotherhoodWashingtonHolotagCommander
  name: head knight's holotags
  description: An ID holotag worn by the Head Knight of the Brotherhood of Steel.
  suffix: Head Knight
  components:
  - type: PresetIdCard
    job: BoSWashingtonCommander

