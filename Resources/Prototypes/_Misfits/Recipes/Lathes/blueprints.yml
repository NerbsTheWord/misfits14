# #Misfits Add: Faction blueprint lathe recipes.
#
# SECTION A (REMOVED) — Blueprint PRINTING recipes have been commented out.
#   Blueprint items are world-found, not crafted.  Printing them for Paper: 100
#   at the bench was confusing: the printed blueprint appeared as the "craftable"
#   item instead of the armor it enables.  The static recipe entries on
#   N14WorkbenchArmorbench have also been removed in craftingbenches.yml.
#
# SECTION B — Blueprint CRAFTING recipes (workbench → faction armor item)
#   Discovered dynamically by AddStorageBlueprintRecipes when the matching
#   blueprint item is inside the workbench storage container.
#   requiresBlueprint: true  →  LatheMenu.IsBlueprintRecipe returns true
#   → recipe appears in the Blueprints sub-section of the lathe UI with its
#   actual material cost shown on hover.  Appears in Craftable Now only when
#   Cloth + Thread are in storage.
#
# Faction coverage: Brotherhood of Steel, Caesar's Legion, New California Republic.

