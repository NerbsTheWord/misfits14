# ===========================================================================
# SECTION B – BLUEPRINT CRAFTING RECIPES
#   requiresBlueprint: true classifies these in the Blueprints tab of the lathe.
#   They are NOT in any staticRecipes list: AddStorageBlueprintRecipes adds them
#   dynamically when the matching blueprint entity is in the workbench storage.
#
#   Material cost: Cloth + Thread (what the hand-crafting recipes require).
#   Cloth: 100  = 1× MaterialCloth1 sheet
#   Thread: 100 = 1× N14MaterialThread1 spool
# ===========================================================================

# --- Brotherhood of Steel ---

# N14ClothingOuterMBoSInitiateArmorRecipe: Cloth x1, Thread x2
- type: latheRecipe
  id: N14ClothingOuterMBoSInitiateArmorBlueprintCraft
  result: N14ClothingOuterMBoSInitiateArmor
  category: N14Armor
  completetime: 7
  requiresBlueprint: true
  availableFaction:
    - BrotherhoodOfSteel
  materials:
    Cloth: 100
    Thread: 200

